<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>バドミントン戦略ボード</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- ヘッダー -->
  <header id="header">
    <h1>バドミントン戦略ボード</h1>
    <div id="mode-selector">
      <button class="mode-btn active" data-mode="singles">シングルス</button>
      <button class="mode-btn" data-mode="doubles">ダブルス</button>
      <button class="mode-btn" data-mode="mixed">ミックス</button>
    </div>
  </header>

  <!-- コートエリア -->
  <main id="court-container">
    <canvas id="court-canvas"></canvas>
    <canvas id="drawing-canvas"></canvas>
    <div id="players-layer"></div>
    <div id="text-input-overlay" class="hidden">
      <textarea id="text-input-field" placeholder="テキストを入力"></textarea>
      <div id="text-input-actions">
        <button id="text-confirm-btn">確定</button>
        <button id="text-cancel-btn">キャンセル</button>
      </div>
    </div>
  </main>

  <!-- ツールバー -->
  <div id="toolbar">
    <div id="tool-buttons">
      <button class="tool-btn active" data-tool="move" title="選手を移動">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M13 6v5h5V7.75L22.25 12 18 16.25V13h-5v5h3.25L12 22.25 7.75 18H11v-5H6v3.25L1.75 12 6 7.75V11h5V6H7.75L12 1.75 16.25 6H13z" fill="currentColor"/></svg>
      </button>
      <button class="tool-btn" data-tool="shuttle" title="シャトル軌道">
        <svg viewBox="0 0 24 24" width="24" height="24"><circle cx="4" cy="4" r="3" fill="currentColor"/><line x1="4" y1="4" x2="20" y2="20" stroke="currentColor" stroke-width="2" stroke-dasharray="4,2"/><polygon points="20,20 15,19 19,15" fill="currentColor"/></svg>
      </button>
      <button class="tool-btn" data-tool="freehand" title="フリーハンド">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" fill="currentColor"/></svg>
      </button>
      <button class="tool-btn" data-tool="arrow" title="矢印">
        <svg viewBox="0 0 24 24" width="24" height="24"><line x1="4" y1="20" x2="18" y2="6" stroke="currentColor" stroke-width="2.5"/><polygon points="20,4 13,5 19,11" fill="currentColor"/></svg>
      </button>
      <button class="tool-btn" data-tool="text" title="テキスト">
        <svg viewBox="0 0 24 24" width="24" height="24"><text x="4" y="18" font-size="16" font-weight="bold" fill="currentColor">T</text></svg>
      </button>
      <div class="tool-separator"></div>
      <button class="tool-btn" id="undo-btn" title="元に戻す">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12.5 8c-2.65 0-5.05 1.04-6.83 2.73L2 7v9h9l-3.62-3.62A7.98 7.98 0 0112.5 10c3.26 0 6.05 1.95 7.29 4.75l1.89-.75A9.98 9.98 0 0012.5 8z" fill="currentColor"/></svg>
      </button>
      <button class="tool-btn" id="clear-drawing-btn" title="描画をクリア">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" fill="currentColor"/></svg>
      </button>
    </div>
  </div>

  <!-- 録画・再生コントロール -->
  <div id="playback-bar">
    <div id="playback-buttons">
      <button class="playback-btn" id="rec-btn" title="録画">
        <span class="rec-dot"></span> 録画
      </button>
      <button class="playback-btn" id="stop-btn" title="停止" disabled>
        <svg viewBox="0 0 24 24" width="18" height="18"><rect x="6" y="6" width="12" height="12" fill="currentColor"/></svg>
      </button>
      <button class="playback-btn" id="play-btn" title="再生" disabled>
        <svg viewBox="0 0 24 24" width="18" height="18"><polygon points="8,5 19,12 8,19" fill="currentColor"/></svg>
      </button>
      <button class="playback-btn" id="pause-btn" title="一時停止" disabled>
        <svg viewBox="0 0 24 24" width="18" height="18"><rect x="6" y="5" width="4" height="14" fill="currentColor"/><rect x="14" y="5" width="4" height="14" fill="currentColor"/></svg>
      </button>
      <button class="playback-btn" id="rewind-btn" title="巻き戻し" disabled>
        <svg viewBox="0 0 24 24" width="18" height="18"><polygon points="11,5 2,12 11,19" fill="currentColor"/><polygon points="22,5 13,12 22,19" fill="currentColor"/></svg>
      </button>
    </div>
    <input type="range" id="seek-bar" min="0" max="100" value="0" disabled>
    <div id="playback-time">0:00 / 0:00</div>
  </div>

  <!-- 保存・読み込みバー -->
  <div id="save-bar">
    <button id="save-btn" class="save-action-btn">保存</button>
    <button id="load-btn" class="save-action-btn">読み込み</button>
    <button id="new-btn" class="save-action-btn">新規</button>
  </div>

  <!-- 保存ダイアログ -->
  <div id="save-dialog" class="dialog-overlay hidden">
    <div class="dialog">
      <h2>戦略を保存</h2>
      <label for="save-title">タイトル</label>
      <input type="text" id="save-title" placeholder="例: ミックス サーブレシーブ攻撃パターン">
      <label for="save-memo">メモ</label>
      <textarea id="save-memo" placeholder="メモを入力（任意）"></textarea>
      <div class="dialog-actions">
        <button id="save-confirm" class="dialog-btn primary">保存</button>
        <button id="save-cancel" class="dialog-btn">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- 読み込みダイアログ -->
  <div id="load-dialog" class="dialog-overlay hidden">
    <div class="dialog">
      <h2>戦略を読み込み</h2>
      <div id="load-list"></div>
      <div class="dialog-actions">
        <button id="load-cancel" class="dialog-btn">閉じる</button>
      </div>
    </div>
  </div>

  <script src="js/court.js"></script>
  <script src="js/players.js"></script>
  <script src="js/drawing.js"></script>
  <script src="js/recorder.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
